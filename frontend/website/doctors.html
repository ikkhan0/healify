<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Public Directory - Healify</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-container { max-width:1200px; margin:0 auto; padding:2rem 4rem; background:#fff; min-height:80vh; border-radius:16px; margin-top:2rem; box-shadow:0 10px 30px rgba(0,0,0,0.05); }
    .page-header { display:flex; justify-content:space-between; align-items:flex-end; border-bottom:1px solid #EAF4FC; padding-bottom:1.5rem; margin-bottom:2rem; }
    .page-title { color:#0A2753; font-size:2.5rem; margin:0; }
    .search-box { display:flex; gap:10px; }
    .search-box input, .search-box select { padding:12px 20px; border-radius:30px; border:1px solid #c7ecee; font-size:1rem; outline:none; }
    
    .doctors-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:25px; }
    
    .doc-card { background:#F3FAFE; padding:1.5rem; border-radius:16px; transition:transform 0.2s, box-shadow 0.2s; cursor:pointer; }
    .doc-card:hover { transform:translateY(-5px); box-shadow:0 10px 20px rgba(0,0,0,0.08); background:#fff; border:1px solid #EAF4FC; }
    .doc-top { display:flex; align-items:center; gap:15px; margin-bottom:1rem; }
    .doc-img { width:60px; height:60px; border-radius:14px; background:#EAF4FC; display:flex; align-items:center; justify-content:center; overflow:hidden; color:#0A2753; font-size:1.5rem; font-weight:700; border:2px solid #fff; box-shadow:0 4px 10px rgba(0,0,0,0.05); }
    .doc-info h3 { margin:0 0 5px 0; color:#0A2753; font-size:1.2rem; }
    .doc-info p { margin:0; color:#1C448E; font-size:0.9rem; font-weight:600; }
    
    .doc-stats { display:flex; justify-content:space-between; background:#EAF4FC; border-radius:10px; padding:10px 15px; font-size:0.85rem; font-weight:700; color:#1C448E; }
    
    /* MODAL CSS FROM WEB APP */
    .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(10,39,83,0.6); z-index:1000; backdrop-filter:blur(3px); }
    .btn-main { background:#0A2753; color:#fff; width:100%; padding:15px; border-radius:12px; border:none; font-size:1.1rem; font-weight:700; cursor:pointer; }
  </style>
</head>
<body class="landing-body" style="background:#F3FAFE">
  
  <header class="top-nav" style="background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%); color:#fff; padding:1.5rem 4rem;">
    <div class="logo">
      <div class="logo-circle-small"></div>
      <span class="logo-text" style="color:#fff">Healify</span>
    </div>
    <nav class="nav-links">
      <a href="/" style="color:#fff">Home</a>
      <a href="/doctors.html" class="active" style="color:#fff; border-bottom:2px solid #0A2753;">Find a Doctor</a>
      <a href="/how-it-works.html" style="color:#fff">How it works</a>
      <a href="/about-us.html" style="color:#fff">About us</a>
      <a href="/contact-us.html" style="color:#fff">Contact Us</a>
    </nav>
    <div class="nav-icons" style="color:#fff">
      <a href="/role-selection.html" style="text-decoration:none; color:#1C448E; background:#fff; padding:10px 20px; border-radius:30px; font-weight:700; font-size:1rem;">Login / Signup</a>
    </div>
  </header>

  <div class="page-container">
    <div class="page-header">
      <div>
         <h1 class="page-title">Verified Psychiatrists</h1>
         <p style="color:#1C448E; margin-top:5px; font-size:1.1rem; font-weight:600;">Find your perfect mental wellness partner.</p>
      </div>
      <div class="search-box">
         <input type="text" id="search-input" placeholder="Search by name..." oninput="fetchPublicDoctors()">
         <select id="spec-filter" onchange="fetchPublicDoctors()">
            <option value="">All Specialties</option>
            <option value="Psychiatrist">Psychiatrist</option>
            <option value="Psychologist">Psychologist</option>
            <option value="Therapist">Therapist</option>
         </select>
      </div>
    </div>
    
    <div id="loading" style="text-align:center; padding:50px; color:#1C448E; font-weight:700; display:none;">
       <i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Loading specialists...
    </div>
    
    <div class="doctors-grid" id="doctors-list">
      <!-- Dynamic Content -->
    </div>
  </div>

  <!-- PUBLIC DOCTOR PREVIEW MODAL (Marham style) -->
  <div id="doctor-detail-modal" class="modal-overlay" style="display:none; align-items:center; justify-content:center; padding:1rem;">
    <div style="width:500px; max-width:100%; max-height:90vh; overflow-y:auto; padding:0; background:#fff; border-radius:16px; position:relative;">
      <div style="padding:1.5rem; border-bottom:1px solid #EAF4FC; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:#fff; z-index:10;">
        <h2 style="color:#0A2753; margin:0; font-size:1.5rem;">Doctor Profile</h2>
        <button onclick="document.getElementById('doctor-detail-modal').style.display='none'" style="background:none; border:none; font-size:1.5rem; cursor:pointer;"><i class="fas fa-times"></i></button>
      </div>
      <div id="doctor-modal-content" style="padding:1.5rem;">
        <!-- Dynamic Content -->
      </div>
    </div>
  </div>

  <script>
    async function fetchPublicDoctors() {
      const search = document.getElementById('search-input').value;
      const spec = document.getElementById('spec-filter').value;
      
      const list = document.getElementById('doctors-list');
      const loader = document.getElementById('loading');
      list.innerHTML = '';
      loader.style.display = 'block';
      
      try {
        let url = '/api/patients/doctors?';
        if(search) url += `search=${encodeURIComponent(search)}&`;
        if(spec) url += `specialty=${encodeURIComponent(spec)}`;
        
        const res = await fetch(url).then(r => r.json());
        loader.style.display = 'none';
        
        if (res.success && res.doctors.length > 0) {
          list.innerHTML = res.doctors.map(d => {
            const dp = d.doctorProfile || {};
            const initials = d.name.split(' ').map(n=>n[0]).join('').toUpperCase();
            const exp = dp.experience ? dp.experience + ' Years' : '10+ Years';
            return `
              <div class="doc-card" onclick="openPublicProfile('${d._id}')">
                <div class="doc-top">
                  <div class="doc-img">${d.profileImage ? `<img src="${d.profileImage}" style="width:100%;height:100%;object-fit:cover">` : initials}</div>
                  <div class="doc-info">
                    <h3>Dr. ${d.name}</h3>
                    <p>${dp.specialty || 'General Psychiatry'}</p>
                  </div>
                </div>
                <div class="doc-stats">
                  <span><i class="fas fa-star" style="color:#FFD700;"></i> ${dp.rating || 4.5}</span>
                  <span><i class="fas fa-briefcase"></i> ${exp}</span>
                  <span><i class="fas fa-money-bill-wave"></i> RS ${dp.consultationFee || 300}</span>
                </div>
              </div>
            `;
          }).join('');
        } else {
          list.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; color:#1C448E; font-weight:700;">No doctors found matching your criteria.</div>`;
        }
      } catch (err) {
        loader.style.display = 'none';
        list.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; color:red; font-weight:700;">Failed to connect to Healify servers.</div>`;
      }
    }
    
    async function openPublicProfile(id) {
      document.getElementById('doctor-detail-modal').style.display = 'flex';
      const container = document.getElementById('doctor-modal-content');
      container.innerHTML = '<div style="padding:50px; text-align:center; font-weight:700; color:#1C448E;">Loading public profile...</div>';
      
      try {
        const res = await fetch('/api/patients/doctors/' + id).then(r => r.json());
        if(res.success) {
          const d = res.doctor;
          const dp = d.doctorProfile || {};
          const initials = d.name.split(' ').map(n=>n[0]).join('').toUpperCase();
          const pExp = dp.experience ? dp.experience + ' Years Experience' : 'Extensive experience in mental health care.';
          const pEdu = dp.education || 'Certified Professional';
          const pBio = dp.bio || 'A compassionate professional who makes complex issues feel manageable.';
          
          const rating = dp.rating || 4.5;
          let stars = '';
          for(let i=1; i<=5; i++) {
             stars += `<i class="fa${i<=rating?'s':'-regular'} fa-star" style="color:#FFD700;"></i>`;
          }
          
          container.innerHTML = `
            <div style="text-align:center; margin-bottom:1.5rem;">
              <div style="width:150px; height:150px; border-radius:50%; overflow:hidden; margin:0 auto 1rem auto; background:#EAF4FC; display:flex; align-items:center; justify-content:center; font-size:3rem; color:#0A2753; border:4px solid #fff; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
                ${d.profileImage ? `<img src="${d.profileImage}" style="width:100%;height:100%;object-fit:cover">` : initials}
              </div>
              <h3 style="color:#0A2753; font-size:1.8rem; font-weight:800; margin-bottom:0.3rem;">Dr. ${d.name}</h3>
              <div style="margin-bottom:0.8rem; font-size:1.2rem;">${stars}</div>
              <div style="display:flex; justify-content:center; gap:20px; color:#1C448E; font-weight:600; font-size:1.1rem; margin-bottom:1.5rem;">
                 <div><i class="fas fa-stethoscope"></i> ${dp.specialty || 'Psychiatrist'}</div>
                 <div><i class="fas fa-money-bill-wave"></i> Fee: RS ${dp.consultationFee || 300}</div>
              </div>
            </div>
            
            <div style="background:#F3FAFE; padding:1.2rem; border-radius:12px; margin-bottom:1.5rem; display:grid; grid-template-columns:1fr 1fr; gap:15px; font-weight:600; color:#1C448E; text-align:center;">
               <div><div style="font-size:0.9rem; color:#5DADE2;">Experience</div><div>${pExp}</div></div>
               <div><div style="font-size:0.9rem; color:#5DADE2;">Wait Time</div><div>Under 15 Min</div></div>
            </div>
            
            <div style="text-align:left; margin-bottom:2rem;">
              <h4 style="color:#0A2753; font-size:1.2rem; margin-bottom:0.8rem; font-weight:700;">Education</h4>
              <p style="color:#1C448E; line-height:1.6; margin-bottom:1.5rem;">${pEdu}</p>
              
              <h4 style="color:#0A2753; font-size:1.2rem; margin-bottom:0.8rem; font-weight:700;">About The Doctor</h4>
              <p style="color:#1C448E; line-height:1.6; margin-bottom:2rem;">${pBio}</p>
              
              <h4 style="color:#0A2753; font-size:1.2rem; margin-bottom:0.8rem; font-weight:700;">Patient Reviews</h4>
              <div style="display:flex; gap:10px; overflow-x:auto; margin-bottom:2rem; padding-bottom:10px;">
                ${dp.reviews && dp.reviews.length ? dp.reviews.map(r => `
                <div style="background:#5DADE2; min-width:280px; border-radius:12px; padding:1.2rem; color:#fff; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
                   <div style="margin-bottom:0.5rem; font-size:1rem; color:#FFD700;"><i class="fas fa-star"></i> ${r.rating}</div>
                   <p style="font-size:0.95rem; line-height:1.4;">"${r.comment}"</p>
                   <div style="font-size:0.8rem; margin-top:10px; opacity:0.9; font-weight:600;">- ${r.patientName}</div>
                </div>`).join('') : '<div style="color:#1C448E; font-weight:600; padding:1rem;">No reviews yet.</div>'}
              </div>
            </div>
            
            <button class="btn-main" onclick="window.location.href='/role-selection.html'"><i class="fas fa-calendar-check" style="margin-right:8px;"></i> Book Appointment Now</button>
            <p style="text-align:center; font-size:0.85rem; color:#5DADE2; margin-top:10px;">Requires patient login</p>
          `;
        }
      } catch(e) { container.innerHTML = '<div style="color:red; text-align:center;">Error loading profile</div>'; }
    }
    
    // Initial fetch
    fetchPublicDoctors();
  </script>
  <script src="/shared/js/settings-sync.js"></script>
</body>
</html>
