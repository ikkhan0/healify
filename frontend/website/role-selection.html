<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeleMind - Select Role</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="role-body no-footer">
  <div class="role-container">
    <div class="logo-circle"></div>
    <div class="brand-text">
       <h1>TeleMind <span class="stethoscope-icon">⚕️</span></h1>
       <h2 class="role-title">How Would You Like To Continue</h2>
       <div class="role-buttons">
         <button class="btn-role" onclick="window.location.href='/doctor/'">I am Doctor</button>
         <button class="btn-role" onclick="window.location.href='/patient/'">I am Patient</button>
       </div>
    </div>
  </div>
  <div class="decorative-circles">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
  </div>
  <script src="/shared/js/settings-sync.js"></script>

  <!-- Floating Google Translate Widget -->
  <div id="google_translate_element" style="position:fixed;bottom:25px;left:25px;z-index:9999;background:rgba(255,255,255,0.8);border-radius:10px;padding:5px;box-shadow:0 4px 15px rgba(0,0,0,0.1);"></div>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'en', includedLanguages: 'en,ur', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
    }
    
    // RTL Mutator
    const observer = new MutationObserver(mutations => {
      mutations.forEach(mutation => {
        const html = document.documentElement;
        if (html.classList.contains('translated-rtl') || html.getAttribute('lang') === 'ur') {
          html.setAttribute('dir', 'rtl');
        } else {
          html.setAttribute('dir', 'ltr');
        }
      });
    });
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class', 'lang'] });
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
